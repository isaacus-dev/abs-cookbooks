<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metadata Viewer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182b;
      --panel-2: #17213a;
      --text: #e6ebff;
      --muted: #9aa6c7;
      --accent: #7aa2ff;
      --accent-2: #5de1c0;
      --border: #273454;
      --danger: #ff7b7b;
      --chip: #1f2a46;
      --shadow: 0 18px 40px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #0a0f1d 0%, #0f1628 100%);
      color: var(--text);
      font: 14px/1.45 Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .app {
      max-width: 1320px;
      margin: 24px auto;
      padding: 0 16px 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 16px;
      margin-bottom: 16px;
    }
    .title h1 {
      margin: 0 0 4px;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }
    .title p {
      margin: 0;
      color: var(--muted);
    }
    .status {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .status.ok { color: var(--accent-2); }
    .status.bad { color: #ffb3b3; }
    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 16px;
    }
    .panel {
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-inner { padding: 16px; }
    .dropzone {
      border: 1.5px dashed #40588f;
      border-radius: 16px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(122,162,255,.08), rgba(122,162,255,.03));
      text-align: center;
      transition: .18s ease;
      cursor: pointer;
    }
    .dropzone.dragover {
      border-color: var(--accent-2);
      background: linear-gradient(180deg, rgba(93,225,192,.10), rgba(93,225,192,.04));
      transform: translateY(-1px);
    }
    .dropzone .big {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .dropzone .small {
      color: var(--muted);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      margin: 14px 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      background: #0c1324;
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    button {
      border: 1px solid var(--border);
      background: #13203c;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button.primary {
      background: linear-gradient(180deg, #2e4fa8, #25418a);
      border-color: #4564ba;
    }
    button:disabled {
      opacity: .5;
      cursor: default;
    }
    input[type="file"] { display: none; }
    .help {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
    }
    .summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .card h3 {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .card .value {
      font-size: 16px;
      font-weight: 700;
      word-break: break-word;
    }
    .viewer {
      padding: 16px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .toolbar input {
      width: 280px;
      max-width: 100%;
      border: 1px solid var(--border);
      background: #0c1324;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      border-spacing: 0;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    thead th {
      background: #121a30;
      color: var(--muted);
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      padding: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-bottom: 1px solid var(--border);
    }
    tbody td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      vertical-align: top;
    }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      background: var(--chip);
      color: #d5ddff;
      border: 1px solid #314165;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .empty {
      color: var(--muted);
      padding: 28px 8px;
      text-align: center;
    }
    .error {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,123,123,.08);
      border: 1px solid rgba(255,123,123,.28);
      color: #ffc0c0;
      display: none;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="title">
        <h1>Metadata Viewer</h1>
        <p>Paste text or drop a file, send it to Python in the notebook, and render the extracted metadata.</p>
      </div>
      <div id="bridgeStatus" class="status">Checking notebook bridge…</div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="panel-inner">
          <label class="dropzone" id="dropzone" for="fileInput">
            <span class="big">Drop a file here or click to browse</span>
            <span class="small">Supports pasted text, pasted files, dragged files, or file selection.</span>
          </label>
          <input id="fileInput" type="file" />

          <div class="divider">or paste text</div>

          <textarea id="textInput" placeholder="Paste document text here…"></textarea>
          <div class="actions">
            <button id="processTextBtn" class="primary">Process text</button>
            <button id="clearBtn">Clear</button>
          </div>
          <div class="help" id="sourceLabel">No source loaded.</div>
          <div class="error" id="errorBox"></div>
        </div>
      </div>

      <div class="panel">
        <div class="viewer">
          <div class="summary">
            <div class="card">
              <h3>Pretty title</h3>
              <div id="prettyTitle" class="value">—</div>
            </div>
            <div class="card">
              <h3>Category</h3>
              <div id="category" class="value">—</div>
            </div>
            <div class="card">
              <h3>Title</h3>
              <div id="title" class="value">—</div>
            </div>
            <div class="card">
              <h3>Date</h3>
              <div id="date" class="value">—</div>
            </div>
          </div>

          <div class="toolbar">
            <div class="mono" id="recordCount">0 records</div>
            <input id="filterInput" type="search" placeholder="Filter fields or values…" />
          </div>

          <table>
            <thead>
              <tr>
                <th style="width: 24%;">Field</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="2" class="empty">No metadata yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const BRIDGE_IDS = {
      request: 'metadata_viewer_request',
      response: 'metadata_viewer_response',
      submit: 'metadata_viewer_submit',
    };

    const state = {
      sourceName: null,
      currentData: null,
    };

    const el = {
      bridgeStatus: document.getElementById('bridgeStatus'),
      dropzone: document.getElementById('dropzone'),
      fileInput: document.getElementById('fileInput'),
      textInput: document.getElementById('textInput'),
      processTextBtn: document.getElementById('processTextBtn'),
      clearBtn: document.getElementById('clearBtn'),
      sourceLabel: document.getElementById('sourceLabel'),
      errorBox: document.getElementById('errorBox'),
      prettyTitle: document.getElementById('prettyTitle'),
      category: document.getElementById('category'),
      title: document.getElementById('title'),
      date: document.getElementById('date'),
      filterInput: document.getElementById('filterInput'),
      tableBody: document.getElementById('tableBody'),
      recordCount: document.getElementById('recordCount'),
    };

    function bridgeReady() {
      return document.getElementById(BRIDGE_IDS.request) && document.getElementById(BRIDGE_IDS.response) && document.getElementById(BRIDGE_IDS.submit);
    }

    function setBridgeStatus() {
      if (bridgeReady()) {
        el.bridgeStatus.textContent = 'Notebook bridge ready';
        el.bridgeStatus.className = 'status ok';
      } else {
        el.bridgeStatus.textContent = 'Notebook bridge not found';
        el.bridgeStatus.className = 'status bad';
      }
    }

    function showError(message) {
      el.errorBox.style.display = 'block';
      el.errorBox.textContent = message;
    }

    function clearError() {
      el.errorBox.style.display = 'none';
      el.errorBox.textContent = '';
    }

    function normalizeValue(value) {
      if (value == null) return '';
      if (typeof value === 'string') return value;
      if (Array.isArray(value)) return value;
      if (typeof value === 'object') return JSON.stringify(value, null, 2);
      return String(value);
    }

    function readCategory(data) {
      const value = data?.category;
      if (!value) return '—';
      if (typeof value === 'string') return value;
      if (value.label) return value.label;
      return JSON.stringify(value);
    }

    function summaryValue(value) {
      if (Array.isArray(value)) return value.join(', ') || '—';
      if (value == null || value === '') return '—';
      if (typeof value === 'object') return JSON.stringify(value);
      return String(value);
    }

    function renderChips(values) {
      if (!values || (Array.isArray(values) && values.length === 0)) return '<span class="empty">—</span>';
      if (!Array.isArray(values)) return `<span>${escapeHtml(summaryValue(values))}</span>`;
      return `<div class="chips">${values.map(v => `<span class="chip">${escapeHtml(summaryValue(v))}</span>`).join('')}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function buildRows(data) {
      const rows = [
        ['source_name', data?.source_name || state.sourceName || ''],
        ['title', data?.title || ''],
        ['pretty_title', data?.pretty_title || ''],
        ['date', data?.date || ''],
        ['category', readCategory(data)],
        ['parties', data?.parties || []],
        ['locations', data?.locations || []],
        ['terms', data?.terms || []],
        ['signatures', data?.signatures || []],
      ];

      const extras = Object.entries(data || {}).filter(([k]) => !rows.some(([name]) => name === k));
      return rows.concat(extras);
    }

    function render(data) {
      state.currentData = data || null;
      el.prettyTitle.textContent = summaryValue(data?.pretty_title);
      el.category.textContent = summaryValue(readCategory(data));
      el.title.textContent = summaryValue(data?.title);
      el.date.textContent = summaryValue(data?.date);

      const filter = (el.filterInput.value || '').trim().toLowerCase();
      const rows = buildRows(data).filter(([field, value]) => {
        if (!filter) return true;
        const hay = `${field} ${JSON.stringify(value)}`.toLowerCase();
        return hay.includes(filter);
      });

      el.recordCount.textContent = `${rows.length} fields`;

      if (!rows.length) {
        el.tableBody.innerHTML = '<tr><td colspan="2" class="empty">No matching fields.</td></tr>';
        return;
      }

      el.tableBody.innerHTML = rows.map(([field, value]) => {
        const renderedValue = Array.isArray(value)
          ? renderChips(value)
          : (typeof value === 'object' && value !== null)
            ? `<pre class="mono">${escapeHtml(JSON.stringify(value, null, 2))}</pre>`
            : `<span>${escapeHtml(summaryValue(value))}</span>`;
        return `<tr><td class="mono">${escapeHtml(field)}</td><td>${renderedValue}</td></tr>`;
      }).join('');
    }

    function updateSourceLabel(name) {
      state.sourceName = name || null;
      el.sourceLabel.textContent = name ? `Loaded source: ${name}` : 'No source loaded.';
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const base64 = result.includes(',') ? result.split(',')[1] : result;
          resolve(base64);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function waitForResponse(timeoutMs = 120000) {
      const responseEl = document.getElementById(BRIDGE_IDS.response);
      return new Promise((resolve, reject) => {
        const start = Date.now();
        const initial = responseEl.value;
        const timer = setInterval(() => {
          if (responseEl.value && responseEl.value !== initial) {
            clearInterval(timer);
            try {
              resolve(JSON.parse(responseEl.value));
            } catch (err) {
              reject(err);
            }
            return;
          }
          if (Date.now() - start > timeoutMs) {
            clearInterval(timer);
            reject(new Error('Timed out waiting for the notebook response.'));
          }
        }, 250);
      });
    }

    async function sendToPython(payload) {
      if (!bridgeReady()) throw new Error('Notebook bridge not found. Run the Python bridge cell before rendering this HTML.');

      clearError();
      const requestEl = document.getElementById(BRIDGE_IDS.request);
      const responseEl = document.getElementById(BRIDGE_IDS.response);
      const submitEl = document.getElementById(BRIDGE_IDS.submit);

      requestEl.value = JSON.stringify(payload);
      responseEl.value = '';
      requestEl.dispatchEvent(new Event('input', { bubbles: true }));
      requestEl.dispatchEvent(new Event('change', { bubbles: true }));
      submitEl.click();

      return await waitForResponse();
    }

    async function processText() {
      const text = el.textInput.value.trim();
      if (!text) {
        showError('Paste some text first.');
        return;
      }
      updateSourceLabel('Pasted text');
      el.processTextBtn.disabled = true;
      try {
        const result = await sendToPython({ kind: 'text', name: 'Pasted text', text });
        render(result);
      } catch (err) {
        showError(err.message || String(err));
      } finally {
        el.processTextBtn.disabled = false;
      }
    }

    async function processFile(file) {
      updateSourceLabel(file.name);
      clearError();
      try {
        const base64 = await readFileAsBase64(file);
        const result = await sendToPython({ kind: 'file', name: file.name, mime_type: file.type || '', base64 });
        render(result);
      } catch (err) {
        showError(err.message || String(err));
      }
    }

    el.processTextBtn.addEventListener('click', processText);

    el.clearBtn.addEventListener('click', () => {
      el.textInput.value = '';
      el.fileInput.value = '';
      updateSourceLabel(null);
      clearError();
      render(null);
    });

    el.fileInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      if (file) await processFile(file);
    });

    el.dropzone.addEventListener('dragover', (event) => {
      event.preventDefault();
      el.dropzone.classList.add('dragover');
    });

    el.dropzone.addEventListener('dragleave', () => {
      el.dropzone.classList.remove('dragover');
    });

    el.dropzone.addEventListener('drop', async (event) => {
      event.preventDefault();
      el.dropzone.classList.remove('dragover');
      const file = event.dataTransfer.files?.[0];
      if (file) await processFile(file);
    });

    document.addEventListener('paste', async (event) => {
      const items = event.clipboardData?.items || [];
      for (const item of items) {
        if (item.kind === 'file') {
          const file = item.getAsFile();
          if (file) {
            await processFile(file);
            return;
          }
        }
      }
    });

    el.filterInput.addEventListener('input', () => render(state.currentData));

    setBridgeStatus();
    render(null);
  </script>
</body>
</html>
